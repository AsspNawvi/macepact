name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -DskipTests
      - uses: actions/upload-artifact@v3
        with:
          name: CustomMaces
          path: target/CustomMaces-1.0.0.jar
