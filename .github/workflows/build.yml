name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Debug - show repo contents
        run: find . -not -path './.git/*' | sort
      - name: Organize files
        run: |
          mkdir -p project/src/main/java/com/custommaces/listeners
          mkdir -p project/src/main/java/com/custommaces/managers
          mkdir -p project/src/main/java/com/custommaces/commands
          mkdir -p project/src/main/resources
          SRC=project/src/main/java/com/custommaces
          RES=project/src/main/resources
          cp pom.xml project/
          cp plugin.yml $RES/
          cp CustomMaces.java $SRC/
          cp MaceType.java $SRC/
          cp MaceManager.java $SRC/managers/
          cp GodMaceGUIListener.java $SRC/listeners/
          cp GodMaceCraftListener.java $SRC/listeners/
          cp MaceAbilityListener.java $SRC/listeners/
          cp MaceHitListener.java $SRC/listeners/
          cp MaceHoldListener.java $SRC/listeners/
          cp MaceKillListener.java $SRC/listeners/
          cp MaceSmashListener.java $SRC/listeners/
          cp GiveMaceCommand.java $SRC/commands/
          cp MaceListCommand.java $SRC/commands/
      - name: Build
        working-directory: project
        run: mvn package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: CustomMaces
          path: project/target/CustomMaces-2.0.0.jar
