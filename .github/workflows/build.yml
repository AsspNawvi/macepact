name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Unzip and organize files
        run: |
          unzip CustomMaces_v3.zip -d extracted/
          mkdir -p project/src/main/java/com/custommaces/listeners
          mkdir -p project/src/main/java/com/custommaces/managers
          mkdir -p project/src/main/java/com/custommaces/commands
          mkdir -p project/src/main/resources
          SRC=project/src/main/java/com/custommaces
          RES=project/src/main/resources
          cp extracted/pom.xml project/
          cp extracted/plugin.yml $RES/
          cp extracted/CustomMaces.java $SRC/
          cp extracted/MaceType.java $SRC/
          cp extracted/MaceManager.java $SRC/managers/
          cp extracted/GodMaceGUIListener.java $SRC/listeners/
          cp extracted/GodMaceCraftListener.java $SRC/listeners/
          cp extracted/MaceAbilityListener.java $SRC/listeners/
          cp extracted/MaceHitListener.java $SRC/listeners/
          cp extracted/MaceHoldListener.java $SRC/listeners/
          cp extracted/MaceKillListener.java $SRC/listeners/
          cp extracted/MaceSmashListener.java $SRC/listeners/
          cp extracted/GiveMaceCommand.java $SRC/commands/
          cp extracted/MaceListCommand.java $SRC/commands/
      - name: Build
        working-directory: project
        run: mvn package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: CustomMaces
          path: project/target/CustomMaces-2.0.0.jar
