name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Organize files
        run: |
          mkdir -p project/src/main/java/com/custommaces/listeners
          mkdir -p project/src/main/java/com/custommaces/managers
          mkdir -p project/src/main/java/com/custommaces/commands
          mkdir -p project/src/main/resources
          SRC=project/src/main/java/com/custommaces
          RES=project/src/main/resources
          F=.github/workflows
          cp $F/pom.xml project/
          cp $F/plugin.yml $RES/
          cp $F/CustomMaces.java $SRC/
          cp $F/MaceType.java $SRC/
          cp $F/MaceManager.java $SRC/managers/
          cp $F/GodMaceGUIListener.java $SRC/listeners/
          cp $F/GodMaceCraftListener.java $SRC/listeners/
          cp $F/MaceAbilityListener.java $SRC/listeners/
          cp $F/MaceHitListener.java $SRC/listeners/
          cp $F/MaceHoldListener.java $SRC/listeners/
          cp $F/MaceKillListener.java $SRC/listeners/
          cp $F/MaceSmashListener.java $SRC/listeners/
          cp $F/GiveMaceCommand.java $SRC/commands/
          cp $F/MaceListCommand.java $SRC/commands/
      - name: Build
        working-directory: project
        run: mvn package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: CustomMaces
          path: project/target/CustomMaces-2.0.0.jar
